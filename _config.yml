title: Portal de Política de Releases
description: Quais versões podem ser instaladas e quando vale atualizar — RBX-01 e IHM
url: "https://rentbrella-org.github.io"
baseurl: ""
lang: pt-BR

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md

collections:
  rbx01_versions:
    output: true
    permalink: /rbx-01/versions/:name/
  ihm_versions:
    output: true
    permalink: /ihm/versions/:name/

defaults:
  - scope:
      path: ""
      type: rbx01_versions
    values:
      layout: version
      product: rbx-01
      product_name: "RBX-01 — Main Board"
      changelog_url: "https://github.com/Rentbrella-org/fw-rb-main/blob/main/CHANGELOG.md"
  - scope:
      path: ""
      type: ihm_versions
    values:
      layout: version
      product: ihm
      product_name: "IHM — Display DWIN"
      changelog_url: "https://github.com/Rentbrella-org/fw-rb-ihm-dwin/blob/main/CHANGELOG.md"
