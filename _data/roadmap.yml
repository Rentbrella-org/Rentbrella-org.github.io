# Roadmap de versões nomeadas e conjuntos em teste.
# Status: planejada | conceito | desenvolvimento | teste
# Ao lançar uma versão: remova-a daqui e crie a página em _fw_rb_main_versions/ (ou IHM).
# Ao mudar expected_release, atualize também date_updated_at (YYYY-MM-DD).
# Ao concluir um teste: mova de active_tests para finished_tests e preencha finished_at.
# Nomes (versões e testes) sempre em minúsculo.

