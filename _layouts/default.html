<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>Portal de Política de Releases — Rentbrella</p>
      <p class="footer-note">
        <a href="{{ '/releases/policy/' | relative_url }}">Política</a>
        ·
        <a href="{{ '/releases/compatibility/' | relative_url }}">Compatibilidade</a>
        · Detalhes técnicos nos repositórios de firmware.
      </p>
    </div>
  </footer>
</body>
</html>
