<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>Portal de Política de Releases — Rentbrella</p>
      <p class="footer-note">
        <a href="{{ '/releases/policy/' | relative_url }}">Política</a>
        ·
        <a href="{{ '/releases/compatibility/' | relative_url }}">Compatibilidade</a>
        · Detalhes técnicos nos repositórios de firmware.
      </p>
    </div>
  </footer>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    document.querySelectorAll('pre code.language-mermaid').forEach((el) => {
      const graph = document.createElement('div');
      graph.className = 'mermaid';
      graph.textContent = el.textContent;
      el.parentElement.replaceWith(graph);
    });

    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    await mermaid.run({ querySelector: '.mermaid' });
  </script>
</body>
</html>
